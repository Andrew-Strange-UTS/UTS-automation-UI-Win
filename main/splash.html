<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
  <title>Marvin</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    .card {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(160deg, #1e2533 0%, #11151f 100%);
      color: #f4f6fb;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0;
    }
    .message {
      font-size: 14px;
      color: #9aa4b8;
      margin: 0;
    }
    .spinner {
      width: 38px;
      height: 38px;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-top-color: #5b8cff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Marvin</h1>
    <div class="spinner"></div>
    <p class="message">Starting up...</p>
  </div>
</body>
</html>
